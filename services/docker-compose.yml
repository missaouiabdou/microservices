# =============================================================================
# Hub & Spoke Microservices - Docker Compose
# =============================================================================

services:

  # ---------------------------------------------------------------------------
  # GATEWAY (Hub) - Point d'entrée unique
  # ---------------------------------------------------------------------------
  gateway:
    image: nginx:alpine
    container_name: gateway
    ports:
      - "80:80"
    volumes:
      - ./gateway/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - auth-service
      - crm-service
    networks:
      - hub-network

  # ---------------------------------------------------------------------------
  # AUTH SERVICE (Spoke 1) - Symfony 7 + PHP-FPM **MODIFIED FOR POSTGRES**
  # ---------------------------------------------------------------------------
  auth-service:
    build:
      context: ./auth-service
      dockerfile: Dockerfile
      network: host # <--- FIX: Allows internet access during build
    container_name: auth-service
    volumes:
      - ./auth-service:/var/www/html
      - jwt-keys:/var/www/html/config/jwt
    environment:
      APP_ENV: dev
      APP_SECRET: change_me_in_production_please
      # CHANGED: mysql:// -> postgresql://, port 3306 -> 5432
      DATABASE_URL: "postgresql://auth_user:auth_pass@auth-db:5432/auth_db?serverVersion=16&charset=utf8"
      JWT_PASSPHRASE: "your_jwt_passphrase"
    depends_on:
      - auth-db
    networks:
      - hub-network
      - auth-network

  # ---------------------------------------------------------------------------
  # CRM SERVICE (Spoke 2) - .NET 8 Web API
  # ---------------------------------------------------------------------------
  crm-service:
    build:
      context: ./crm-service
      dockerfile: Dockerfile
      network: host
    container_name: crm-service
    ports:
      - "5000:5000"
    volumes:
      - jwt-keys:/app/keys:ro
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: "http://+:5000"
      ConnectionStrings__DefaultConnection: "Host=crm-db;Port=5432;Database=crm_db;Username=crm_user;Password=crm_pass"
    depends_on:
      - crm-db
    networks:
      - hub-network
      - crm-network

  # ---------------------------------------------------------------------------
  # BASE DE DONNÉES AUTH - **CHANGED TO PostgreSQL 16**
  # ---------------------------------------------------------------------------
  auth-db:
    image: postgres:16-alpine # <--- CHANGED: mysql -> postgres
    container_name: auth-db
    environment:
      POSTGRES_DB: auth_db # <--- CHANGED: MYSQL_ vars -> POSTGRES_ vars
      POSTGRES_USER: auth_user
      POSTGRES_PASSWORD: auth_pass
    volumes:
      - auth-db-data:/var/lib/postgresql/data # <--- CHANGED: path
    networks:
      - auth-network

  # ---------------------------------------------------------------------------
  # BASE DE DONNÉES CRM - PostgreSQL 16
  # ---------------------------------------------------------------------------
  crm-db:
    image: postgres:16-alpine
    container_name: crm-db
    environment:
      POSTGRES_DB: crm_db
      POSTGRES_USER: crm_user
      POSTGRES_PASSWORD: crm_pass
    volumes:
      - crm-db-data:/var/lib/postgresql/data
    networks:
      - crm-network

# =============================================================================
# VOLUMES
# =============================================================================
volumes:
  jwt-keys:
  auth-db-data:
  crm-db-data:

    # =============================================================================
    # RÉSEAUX
    # =============================================================================
networks:
  hub-network:
    driver: bridge
  auth-network:
    driver: bridge
  crm-network:
    driver: bridge

