# ============================================================
# Finance Service - Configuration Spring Boot
# ============================================================

server.port=6000
spring.application.name=finance-service

# PostgreSQL (injecte par Docker Compose)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/finance_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:finance_user}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:finance_pass}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Desactiver la securite par defaut pour le moment
# (sera configure quand l'equipe finance implementera le JWT)
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.security.servlet.SecurityAutoConfiguration
