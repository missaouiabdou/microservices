stages:
  - test
  - package
  - containerize
  - deploy_staging
  - deploy_production

variables:
  MAVEN_OPTS: "-Dmaven.repo.local=.m2/repository"
  MAVEN_CLI_OPTS: "-B -ntp"
  IMAGE_TAG: "$CI_COMMIT_SHA"

cache:
  key: "$CI_COMMIT_REF_SLUG"
  paths:
    - .m2/repository

.default_maven:
  image: maven:3.9.6-eclipse-temurin-21
  before_script:
    - chmod +x mvnw

unit_test:
  stage: test
  extends: .default_maven
  services:
    - name: postgres:15-alpine
      alias: postgres
  variables:
    DB_URL: "jdbc:postgresql://postgres:5432/finance_db"
    DB_USERNAME: "postgres"
    DB_PASSWORD: "postgres"
    POSTGRES_DB: "finance_db"
    POSTGRES_USER: "postgres"
    POSTGRES_PASSWORD: "postgres"
  script:
    - ./mvnw $MAVEN_CLI_OPTS clean test
  artifacts:
    when: always
    paths:
      - target/surefire-reports/
    expire_in: 7 days

package_jar:
  stage: package
  extends: .default_maven
  needs: ["unit_test"]
  script:
    - ./mvnw $MAVEN_CLI_OPTS -DskipTests clean package
  artifacts:
    paths:
      - target/*.jar
    expire_in: 7 days

build_and_push_image:
  stage: containerize
  image: docker:26.1.4
  services:
    - name: docker:26.1.4-dind
      command: ["--tls=false"]
  needs: ["package_jar"]
  variables:
    DOCKER_HOST: "tcp://docker:2375"
    DOCKER_TLS_CERTDIR: ""
  before_script:
    - echo "$CI_REGISTRY_PASSWORD" | docker login "$CI_REGISTRY" -u "$CI_REGISTRY_USER" --password-stdin
  script:
    - docker build -t "$CI_REGISTRY_IMAGE:$IMAGE_TAG" -t "$CI_REGISTRY_IMAGE:latest" .
    - docker push "$CI_REGISTRY_IMAGE:$IMAGE_TAG"
    - docker push "$CI_REGISTRY_IMAGE:latest"
  rules:
    - if: '$CI_COMMIT_BRANCH'

.deploy_ssh:
  image: alpine:3.20
  before_script:
    - apk add --no-cache openssh-client
    - mkdir -p ~/.ssh
    - chmod 700 ~/.ssh
    - echo "$SSH_PRIVATE_KEY" | tr -d '\r' > ~/.ssh/id_ed25519
    - chmod 600 ~/.ssh/id_ed25519


deploy_staging:
  stage: deploy_staging
  extends: .deploy_ssh
  needs: ["build_and_push_image"]
  environment:
    name: staging
  script:
    - |
      ssh -o StrictHostKeyChecking=no "$STAGING_SSH_USER@$STAGING_SSH_HOST" << EOF
      set -e
      docker login "$CI_REGISTRY" -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD"
      docker pull "$CI_REGISTRY_IMAGE:$IMAGE_TAG"
      docker stop invoicing-service || true
      docker rm invoicing-service || true
      docker run -d --name invoicing-service --restart unless-stopped \
        -p 8082:8082 \
        -e DB_URL="$STAGING_DB_URL" \
        -e DB_USERNAME="$STAGING_DB_USERNAME" \
        -e DB_PASSWORD="$STAGING_DB_PASSWORD" \
        "$CI_REGISTRY_IMAGE:$IMAGE_TAG"
      EOF
  rules:
    - if: '$CI_COMMIT_BRANCH == "develop"'
      when: manual


deploy_production:
  stage: deploy_production
  extends: .deploy_ssh
  needs: ["build_and_push_image"]
  environment:
    name: production
  script:
    - |
      ssh -o StrictHostKeyChecking=no "$PROD_SSH_USER@$PROD_SSH_HOST" << EOF
      set -e
      docker login "$CI_REGISTRY" -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD"
      docker pull "$CI_REGISTRY_IMAGE:$IMAGE_TAG"
      docker stop invoicing-service || true
      docker rm invoicing-service || true
      docker run -d --name invoicing-service --restart unless-stopped \
        -p 8082:8082 \
        -e DB_URL="$PROD_DB_URL" \
        -e DB_USERNAME="$PROD_DB_USERNAME" \
        -e DB_PASSWORD="$PROD_DB_PASSWORD" \
        "$CI_REGISTRY_IMAGE:$IMAGE_TAG"
      EOF
  rules:
    - if: '$CI_COMMIT_TAG'
      when: manual
