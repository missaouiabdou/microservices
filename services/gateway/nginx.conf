# =============================================================================
# Nginx - Reverse Proxy / API Gateway
# Avec CORS pour le frontend Angular (dev sur :4200)
# =============================================================================

# Resolver Docker interne — ipv6=off pour éviter les timeouts de 10s sur Alpine
resolver 127.0.0.11 valid=30s ipv6=off;

# --- Upstreams avec variables pour résolution DNS dynamique ---
server {
    listen 80;
    server_name localhost;

    # -------------------------------------------------------------------------
    # AUTH SERVICE - Symfony PHP-FPM
    # -------------------------------------------------------------------------
    location /api/auth {
        # CORS preflight (OPTIONS)
        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin "http://localhost:4200" always;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Authorization, Content-Type, Accept" always;
            add_header Access-Control-Allow-Credentials "true" always;
            add_header Access-Control-Max-Age 3600;
            add_header Content-Length 0;
            add_header Content-Type text/plain;
            return 204;
        }

        set $auth_backend auth-service:9000;
        fastcgi_pass $auth_backend;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME /var/www/html/public/index.php;
        fastcgi_param SCRIPT_NAME /index.php;
        fastcgi_param REQUEST_URI $request_uri;
        fastcgi_param DOCUMENT_ROOT /var/www/html/public;

        add_header Access-Control-Allow-Origin "http://localhost:4200" always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type, Accept" always;
        add_header Access-Control-Allow-Credentials "true" always;
    }

    # -------------------------------------------------------------------------
    # CRM SERVICE - .NET 8
    # -------------------------------------------------------------------------
    location /api/crm {
        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin "http://localhost:4200" always;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Authorization, Content-Type, Accept" always;
            add_header Access-Control-Allow-Credentials "true" always;
            add_header Access-Control-Max-Age 3600;
            add_header Content-Length 0;
            add_header Content-Type text/plain;
            return 204;
        }

        set $crm_backend http://crm-service:5000;
        proxy_pass $crm_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        add_header Access-Control-Allow-Origin "http://localhost:4200" always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type, Accept" always;
        add_header Access-Control-Allow-Credentials "true" always;
    }

    # -------------------------------------------------------------------------
    # FINANCE SERVICE - Spring Boot
    # -------------------------------------------------------------------------
    location /api/finance {
        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin "http://localhost:4200" always;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Authorization, Content-Type, Accept" always;
            add_header Access-Control-Allow-Credentials "true" always;
            add_header Access-Control-Max-Age 3600;
            add_header Content-Length 0;
            add_header Content-Type text/plain;
            return 204;
        }

        set $finance_backend http://finance-service:6000;
        proxy_pass $finance_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        add_header Access-Control-Allow-Origin "http://localhost:4200" always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type, Accept" always;
        add_header Access-Control-Allow-Credentials "true" always;
    }

    # -------------------------------------------------------------------------
    # SALES & AI SERVICE - FastAPI Python
    # -------------------------------------------------------------------------
    location /api/sales {
        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin "http://localhost:4200" always;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Authorization, Content-Type, Accept" always;
            add_header Access-Control-Allow-Credentials "true" always;
            add_header Access-Control-Max-Age 3600;
            add_header Content-Length 0;
            add_header Content-Type text/plain;
            return 204;
        }

        set $sales_backend http://sales-service:8004;
        proxy_pass $sales_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        add_header Access-Control-Allow-Origin "http://localhost:4200" always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type, Accept" always;
        add_header Access-Control-Allow-Credentials "true" always;
    }

    # -------------------------------------------------------------------------
    # HEALTH CHECK
    # -------------------------------------------------------------------------
    location /health {
        default_type application/json;
        return 200 '{"status": "gateway_ok"}';
    }
}