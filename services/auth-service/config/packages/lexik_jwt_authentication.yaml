# =============================================================================
# LexikJWTAuthenticationBundle - Configuration des clés RSA
# Les chemins pointent vers le volume Docker partagé (config/jwt/)
# =============================================================================

lexik_jwt_authentication:
    secret_key: '%kernel.project_dir%/config/jwt/private.pem'
    public_key: '%kernel.project_dir%/config/jwt/public.pem'
    pass_phrase: '%env(JWT_PASSPHRASE)%'
    token_ttl: 3600
    user_id_claim: email   # <-- Remplace user_identity_field par user_id_claim
