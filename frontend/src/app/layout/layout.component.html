<div class="shell" [class.collapsed]="!sidebarOpen" [class.hub-mode]="isHub">

    <aside class="sidebar" *ngIf="!isHub">
        <div class="sidebar-brand">
            <img src="assets/logo.jpeg" alt="MAKA" class="sidebar-logo" />
            <div *ngIf="sidebarOpen">
                <span class="sidebar-title">MAKA ERP</span>
                <span class="sidebar-tagline">OPERATIONAL INTELLIGENCE</span>
            </div>
        </div>

        <nav class="sidebar-nav">
            <a *ngFor="let item of menuItems" [routerLink]="item.path" routerLinkActive="active" class="nav-link">
                <span class="nav-icon" [style.background]="item.color + '15'" [style.color]="item.color">
                    <i [class]="item.icon"></i>
                </span>
                <span class="nav-text" *ngIf="sidebarOpen">{{ item.label }}</span>
            </a>
        </nav>

        <div class="sidebar-bottom">
            <button class="nav-link" (click)="toggleTheme()">
                <span class="nav-icon theme-icon">
                    <i class="fa-solid" [class.fa-sun]="themeSvc.isDark()" [class.fa-moon]="!themeSvc.isDark()"></i>
                </span>
                <span class="nav-text" *ngIf="sidebarOpen">{{ themeSvc.isDark() ? 'Mode clair' : 'Mode sombre' }}</span>
            </button>
            <button class="nav-link logout-link" (click)="logout()">
                <span class="nav-icon logout-icon">
                    <i class="fa-solid fa-right-from-bracket"></i>
                </span>
                <span class="nav-text" *ngIf="sidebarOpen">Deconnexion</span>
            </button>

            <div class="sidebar-user" *ngIf="user && sidebarOpen">
                <div class="user-avatar">{{ user.prenom.charAt(0) }}{{ user.nom.charAt(0) }}</div>
                <div class="user-info">
                    <span class="user-name">{{ user.prenom }} {{ user.nom.charAt(0) }}.</span>
                    <span class="user-role">{{ user.roles[0].replace('ROLE_', '') }}</span>
                </div>
            </div>
        </div>
    </aside>

    <!-- overlay mobile -->
    <div class="sidebar-overlay" *ngIf="sidebarOpen && !isHub" (click)="toggleSidebar()"></div>

    <div class="main">
        <header class="topbar">
            <button class="topbar-toggle" (click)="toggleSidebar()" *ngIf="!isHub">
                <i class="fa-solid fa-bars"></i>
            </button>
            <div class="topbar-spacer"></div>
            
            <div style="display: flex; gap: 1rem; align-items: center;" *ngIf="isHub">
                <button class="maka-icon-btn" (click)="toggleTheme()">
                    <i class="fa-solid" [class.fa-sun]="themeSvc.isDark()" [class.fa-moon]="!themeSvc.isDark()"></i>
                </button>
                <button class="maka-icon-btn dng" (click)="logout()">
                    <i class="fa-solid fa-right-from-bracket"></i>
                </button>
            </div>

            <div class="topbar-user" *ngIf="user">
                <div class="topbar-avatar">{{ user.prenom.charAt(0) }}{{ user.nom.charAt(0) }}</div>
                <span class="topbar-user-name">{{ user.prenom }} {{ user.nom.charAt(0) }}.</span>
            </div>
        </header>

        <main class="content">
            <router-outlet></router-outlet>
        </main>
    </div>
</div>
